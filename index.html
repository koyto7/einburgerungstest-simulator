    <script>
      fetch('./questions.json')
        .then(function (r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(function (data) { init(data); })
        .catch(function (err) {
          document.body.innerHTML =
            '<div style="padding:2rem;font-family:sans-serif;max-width:480px;margin:auto">' +
            '<h2>Fragen konnten nicht geladen werden</h2>' +
            '<p>Bitte Seite neu laden. Beim lokalen Entwickeln einen HTTP-Server nutzen, z.B.:</p>' +
            '<pre>python3 -m http.server 8080</pre>' +
            '<p style="color:#c00;font-size:0.85em">' + err + '</p></div>';
          console.error(err);
        });

      function init(QUESTION_BANK) {
      const STORAGE_KEYS = {
        settings: 'eit-sim-settings-v1',
        history: 'eit-sim-history-v1',
        mistakes: 'eit-sim-mistakes-v1',
        session: 'eit-sim-session-v1',
      };

      const STATE_ORDER = [
        ...new Set(QUESTION_BANK.filter(q => q.state).map(q => q.state)),
      ];
      const QUESTION_MAP = new Map(QUESTION_BANK.map(q => [q.id, q]));
      const GENERAL = QUESTION_BANK.filter(q => q.category === 'general');
      const BY_STATE = STATE_ORDER.reduce((acc, state) => {
        acc[state] = QUESTION_BANK.filter(
          q => q.category === 'state' && q.state === state,
        );
        return acc;
      }, {});

      const defaultSettings = {
        state: 'Nordrhein-Westfalen',
        timed: true,
        theme: null,
      };
      const state = {
        view: 'dashboard',
        settings: loadJson(STORAGE_KEYS.settings, defaultSettings),
        history: loadJson(STORAGE_KEYS.history, []),
        mistakes: loadJson(STORAGE_KEYS.mistakes, {}),
        session: loadJson(STORAGE_KEYS.session, null),
        lastResult: null,
      };

      const navItems = [
        { id: 'dashboard', label: 'Dashboard' },
        { id: 'history', label: 'Verlauf' },
        { id: 'mistakes', label: 'Fehler' },
        { id: 'info', label: 'Info' },
      ];

      const main = document.getElementById('main');
      const navGroup = document.getElementById('navGroup');
      const stateSelect = document.getElementById('stateSelect');
      const timedSelect = document.getElementById('timedSelect');
      const resumeButton = document.getElementById('resumeButton');

      function loadJson(key, fallback) {
        try {
          const raw = localStorage.getItem(key);
          return raw ? JSON.parse(raw) : fallback;
        } catch (e) {
          return fallback;
        }
      }

      function saveJson(key, value) {
        localStorage.setItem(key, JSON.stringify(value));
      }

      function persistSettings() {
        saveJson(STORAGE_KEYS.settings, state.settings);
      }
      function persistHistory() {
        saveJson(STORAGE_KEYS.history, state.history);
      }
      function persistMistakes() {
        saveJson(STORAGE_KEYS.mistakes, state.mistakes);
      }
      function persistSession() {
        if (state.session) saveJson(STORAGE_KEYS.session, state.session);
        else localStorage.removeItem(STORAGE_KEYS.session);
      }

      function formatDate(iso) {
        return new Date(iso).toLocaleString('de-DE', {
          dateStyle: 'medium',
          timeStyle: 'short',
        });
      }

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function shuffle(arr) {
        const copy = [...arr];
        for (let i = copy.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
      }

      function sample(arr, count) {
        return shuffle(arr).slice(0, count);
      }

      function getQuestion(id) {
        return QUESTION_MAP.get(id);
      }

      function isVisualQuestion(question) {
        const opts = question.options || [];
        const normalized = opts.map(opt => opt.trim());
        const isBild = normalized.every(opt => /^Bild\s?[1-4]$/i.test(opt));
        const isMap = normalized.every(opt => /^[1-4]$/.test(opt));
        return isBild || isMap;
      }

      function computeSummary() {
        const attempts = state.history.length;
        const passed = state.history.filter(a => a.passed).length;
        const avg = attempts
          ? Math.round(
              (state.history.reduce((sum, a) => sum + a.correct, 0) /
                attempts) *
                10,
            ) / 10
          : 0;
        const totalMistakes = Object.values(state.mistakes).reduce(
          (sum, item) => sum + (item.wrongCount || 0),
          0,
        );
        return {
          attempts,
          passed,
          avg,
          totalMistakes,
          passRate: attempts ? Math.round((passed / attempts) * 100) : 0,
        };
      }

      function getRelevantMistakeIds() {
        const selectedState = state.settings.state;
        return Object.entries(state.mistakes)
          .filter(([, stat]) => (stat.wrongCount || 0) > 0)
          .map(([id]) => Number(id))
          .filter(id => {
            const q = getQuestion(id);
            return q && (q.category === 'general' || q.state === selectedState);
          });
      }

      function buildSimulationSession(mode) {
        const selectedState = state.settings.state;
        const generalIds = sample(GENERAL, 30).map(q => q.id);
        const stateIds = sample(BY_STATE[selectedState], 3).map(q => q.id);
        const questionIds = shuffle([...generalIds, ...stateIds]);
        return {
          id: 'session-' + Date.now(),
          mode,
          state: selectedState,
          startedAt: new Date().toISOString(),
          durationSeconds: state.settings.timed ? 60 * 60 : null,
          questionIds,
          currentIndex: 0,
          answers: {},
          submittedAt: null,
        };
      }

      function buildMistakeSession() {
        const ids = getRelevantMistakeIds();
        if (!ids.length) return null;
        const pool = ids.map(id => getQuestion(id));
        const chosen = shuffle(pool)
          .slice(0, Math.min(20, pool.length))
          .map(q => q.id);
        return {
          id: 'mistakes-' + Date.now(),
          mode: 'mistakes',
          state: state.settings.state,
          startedAt: new Date().toISOString(),
          durationSeconds: null,
          questionIds: chosen,
          currentIndex: 0,
          answers: {},
          submittedAt: null,
        };
      }

      function startSimulation() {
        state.session = buildSimulationSession('simulation');
        state.lastResult = null;
        state.view = 'exam';
        persistSession();
        render();
      }

      function startMistakes() {
        const session = buildMistakeSession();
        if (!session) {
          alert(
            'Es gibt noch keine Fehlerfragen für dieses Bundesland. Starte zuerst ein paar Prüfungen.',
          );
          return;
        }
        state.session = session;
        state.lastResult = null;
        state.view = 'exam';
        persistSession();
        render();
      }

      function resumeSession() {
        if (!state.session) return;
        state.view = 'exam';
        render();
      }

      function remainingSeconds(session) {
        if (!session || !session.durationSeconds) return null;
        const elapsed = Math.floor(
          (Date.now() - new Date(session.startedAt).getTime()) / 1000,
        );
        return Math.max(0, session.durationSeconds - elapsed);
      }

      function formatDuration(seconds) {
        const s = Math.max(0, seconds || 0);
        const m = Math.floor(s / 60);
        const rest = s % 60;
        const h = Math.floor(m / 60);
        const mm = m % 60;
        if (h)
          return `${String(h).padStart(2, '0')}:${String(mm).padStart(2, '0')}:${String(rest).padStart(2, '0')}`;
        return `${String(m).padStart(2, '0')}:${String(rest).padStart(2, '0')}`;
      }

      function submitSession(force = false) {
        const session = state.session;
        if (!session) return;
        const unanswered = session.questionIds.filter(
          id => !(id in session.answers),
        );
        if (unanswered.length && !force) {
          const ok = confirm(
            `Es sind noch ${unanswered.length} Fragen unbeantwortet. Trotzdem abgeben?`,
          );
          if (!ok) return;
        }

        const finishedAt = new Date().toISOString();
        const review = session.questionIds.map(id => {
          const q = getQuestion(id);
          const selectedIndex = session.answers[id] ?? null;
          const correctIndex = q.correctIndex;
          return {
            questionId: id,
            selectedIndex,
            correctIndex,
            isCorrect: selectedIndex === correctIndex,
          };
        });

        const correct = review.filter(item => item.isCorrect).length;
        const total = review.length;
        const passed = correct >= 17;
        const durationSec = Math.floor(
          (new Date(finishedAt) - new Date(session.startedAt)) / 1000,
        );
        const wrongQuestionIds = review
          .filter(item => !item.isCorrect)
          .map(item => item.questionId);

        const result = {
          id: session.id,
          mode: session.mode,
          state: session.state,
          startedAt: session.startedAt,
          finishedAt,
          correct,
          total,
          passed,
          durationSec,
          wrongQuestionIds,
          review,
        };

        review.forEach(item => {
          const qid = String(item.questionId);
          const stat = state.mistakes[qid] || {
            seenCount: 0,
            wrongCount: 0,
            correctCount: 0,
            lastWrongAt: null,
            lastSelectedIndex: null,
          };
          stat.seenCount += 1;
          if (item.isCorrect) stat.correctCount += 1;
          else {
            stat.wrongCount += 1;
            stat.lastWrongAt = finishedAt;
            stat.lastSelectedIndex = item.selectedIndex;
          }
          state.mistakes[qid] = stat;
        });

        state.history = [result, ...state.history].slice(0, 200);
        state.lastResult = result;
        state.session = null;
        persistMistakes();
        persistHistory();
        persistSession();
        state.view = 'results';
        render();
      }

      function resetAll() {
        const ok = confirm(
          'Wirklich alle lokalen Daten löschen? Verlauf, Fehlerstatistik und laufende Sitzung werden entfernt.',
        );
        if (!ok) return;
        localStorage.removeItem(STORAGE_KEYS.settings);
        localStorage.removeItem(STORAGE_KEYS.history);
        localStorage.removeItem(STORAGE_KEYS.mistakes);
        localStorage.removeItem(STORAGE_KEYS.session);
        state.settings = { ...defaultSettings };
        state.history = [];
        state.mistakes = {};
        state.session = null;
        state.lastResult = null;
        state.view = 'dashboard';
        hydrateControls();
        applyTheme();
        render();
      }

      function exportBackup() {
        const blob = new Blob(
          [
            JSON.stringify(
              {
                settings: state.settings,
                history: state.history,
                mistakes: state.mistakes,
              },
              null,
              2,
            ),
          ],
          { type: 'application/json' },
        );
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'einbuergerungstest-backup.json';
        a.click();
        URL.revokeObjectURL(url);
      }

      function importBackup(file) {
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const parsed = JSON.parse(reader.result);
            if (parsed.settings)
              state.settings = { ...defaultSettings, ...parsed.settings };
            if (Array.isArray(parsed.history)) state.history = parsed.history;
            if (parsed.mistakes && typeof parsed.mistakes === 'object')
              state.mistakes = parsed.mistakes;
            persistSettings();
            persistHistory();
            persistMistakes();
            hydrateControls();
            applyTheme();
            render();
          } catch (e) {
            alert('Das Backup konnte nicht gelesen werden.');
          }
        };
        reader.readAsText(file);
      }

      function applyTheme() {
        const root = document.documentElement;
        const selected = state.settings.theme;
        const resolved =
          selected ||
          (window.matchMedia('(prefers-color-scheme: dark)').matches
            ? 'dark'
            : 'light');
        root.setAttribute('data-theme', resolved);
      }

      function themeLabel() {
        const current =
          document.documentElement.getAttribute('data-theme') || 'light';
        return current === 'dark' ? 'Hellmodus' : 'Dunkelmodus';
      }

      function renderNav() {
        navGroup.innerHTML = navItems
          .map(
            item => `
          <button class="nav-btn ${state.view === item.id ? 'active' : ''}" data-view="${item.id}">${item.label}</button>
        `,
          )
          .join('');
      }

      function renderDashboard() {
        const summary = computeSummary();
        const relevantMistakes = getRelevantMistakeIds()
          .map(id => {
            const q = getQuestion(id);
            const stat = state.mistakes[id];
            return { id, q, stat };
          })
          .sort((a, b) => (b.stat.wrongCount || 0) - (a.stat.wrongCount || 0))
          .slice(0, 5);

        return `
          <section class="panel hero">
            <div class="section-title">
              <div>
                <h2>Prüfen wie im echten Format</h2>
                <div class="subtle">30 allgemeine Fragen plus 3 Fragen aus deinem Bundesland. Bestehen ab 17 richtigen Antworten.</div>
              </div>
              <div class="pill-row">
                <span class="badge">Bundesland: ${escapeHtml(state.settings.state)}</span>
                <span class="badge">${state.settings.timed ? '60 Minuten' : 'ohne Zeitlimit'}</span>
              </div>
            </div>
            <div class="hero-grid">
              <div class="stat"><strong>${summary.attempts}</strong><span>Versuche</span></div>
              <div class="stat"><strong>${summary.passRate}%</strong><span>Bestanden</span></div>
              <div class="stat"><strong>${summary.avg}</strong><span>Ø richtige Antworten</span></div>
              <div class="stat"><strong>${summary.totalMistakes}</strong><span>Gespeicherte Fehler</span></div>
            </div>
            <div class="inline-actions" style="margin-top:16px;">
              <button class="action-btn" id="heroStart">Neue Prüfung</button>
              <button class="ghost-btn" id="heroMistakes">Fehlertraining</button>
            </div>
          </section>

          <section class="grid two">
            <div class="panel card">
              <div class="section-title"><h2>Letzte Versuche</h2></div>
              ${
                state.history.length
                  ? `
                <div class="history-list">
                  ${state.history
                    .slice(0, 4)
                    .map(
                      item => `
                    <div class="attempt">
                      <div class="attempt-top">
                        <div>
                          <strong>${item.mode === 'mistakes' ? 'Fehlertraining' : 'Prüfungssimulation'}</strong>
                          <div class="attempt-meta">${formatDate(item.finishedAt)} · ${escapeHtml(item.state)} · ${formatDuration(item.durationSec)}</div>
                        </div>
                        <span class="score-pill ${item.passed ? 'pass' : 'fail'}">${item.correct}/${item.total}</span>
                      </div>
                    </div>
                  `,
                    )
                    .join('')}
                </div>
              `
                  : `<div class="empty">Noch keine Versuche gespeichert.</div>`
              }
            </div>

            <div class="panel card">
              <div class="section-title"><h2>Häufige Fehler</h2></div>
              ${
                relevantMistakes.length
                  ? `
                <div class="mistake-list">
                  ${relevantMistakes
                    .map(
                      item => `
                    <div class="mistake-item">
                      <div class="mistake-top">
                        <div>
                          <strong>Frage ${item.q.number}</strong>
                          <div class="small">${escapeHtml(item.q.question)}</div>
                        </div>
                        <span class="badge danger">${item.stat.wrongCount} Fehler</span>
                      </div>
                    </div>
                  `,
                    )
                    .join('')}
                </div>
              `
                  : `<div class="empty">Noch keine Fehler gesammelt. Nach ein paar Durchläufen erscheinen hier deine schwächsten Fragen.</div>`
              }
            </div>
          </section>
        `;
      }

      function renderHistory() {
        return `
          <section class="panel card">
            <div class="section-title">
              <h2>Verlauf</h2>
              <div class="subtle">Die Daten liegen nur in deinem Browser.</div>
            </div>
            ${
              state.history.length
                ? `
              <div class="history-list">
                ${state.history
                  .map(
                    item => `
                  <div class="attempt">
                    <div class="attempt-top">
                      <div>
                        <strong>${item.mode === 'mistakes' ? 'Fehlertraining' : 'Prüfungssimulation'}</strong>
                        <div class="attempt-meta">${formatDate(item.finishedAt)} · ${escapeHtml(item.state)} · ${formatDuration(item.durationSec)} · ${item.passed ? 'bestanden' : 'nicht bestanden'}</div>
                      </div>
                      <span class="score-pill ${item.passed ? 'pass' : 'fail'}">${item.correct}/${item.total}</span>
                    </div>
                    <div class="badge-row">
                      <span class="badge">${item.wrongQuestionIds.length} Fehlerfragen</span>
                      <span class="badge">${item.mode === 'mistakes' ? 'Lernmodus' : 'Prüfungsmodus'}</span>
                    </div>
                  </div>
                `,
                  )
                  .join('')}
              </div>
            `
                : `<div class="empty">Noch kein Verlauf vorhanden.</div>`
            }
          </section>
        `;
      }

      function renderMistakes() {
        const items = getRelevantMistakeIds()
          .map(id => {
            const q = getQuestion(id);
            const stat = state.mistakes[id];
            return { q, stat };
          })
          .sort((a, b) => (b.stat.wrongCount || 0) - (a.stat.wrongCount || 0));

        return `
          <section class="panel card">
            <div class="section-title">
              <div>
                <h2>Fehlertraining</h2>
                <div class="subtle">Es werden allgemeine Fehlerfragen plus Fehler aus dem aktuell gewählten Bundesland berücksichtigt.</div>
              </div>
              <button class="action-btn secondary" id="mistakeStartInline">Training starten</button>
            </div>
            ${
              items.length
                ? `
              <div class="mistake-list">
                ${items
                  .map(
                    item => `
                  <div class="mistake-item">
                    <div class="mistake-top">
                      <div>
                        <strong>Frage ${item.q.number}</strong>
                        <div class="small">${escapeHtml(item.q.question)}</div>
                      </div>
                      <div class="pill-row">
                        <span class="badge danger">${item.stat.wrongCount} falsch</span>
                        <span class="badge success">${item.stat.correctCount || 0} richtig</span>
                      </div>
                    </div>
                  </div>
                `,
                  )
                  .join('')}
              </div>
            `
                : `<div class="empty">Noch keine Fehlerfragen vorhanden.</div>`
            }
          </section>
        `;
      }

      function renderInfo() {
        return `
          <section class="panel card">
            <div class="section-title"><h2>Offizielle Grundlagen</h2></div>
            <div class="grid">
              <div class="muted-box">
                <strong>Was der Simulator nachbildet</strong>
                <p>Die Simulation verwendet das offizielle Format mit 33 Fragen, davon 30 allgemeine Fragen und 3 landesbezogene Fragen. Bestehen ab 17 richtigen Antworten.</p>
              </div>
              <div class="muted-box">
                <strong>Wichtiger Hinweis</strong>
                <p>Die 100 offiziellen Fragebögen werden nicht veröffentlicht. Dieses Tool erzeugt deshalb realistische Prüfungssimulationen aus dem offiziellen Fragenkatalog, bildet aber keinen geheimen Originalbogen nach.</p>
              </div>
              <div class="source-list">
                <div><a href="https://www.gesetze-im-internet.de/einbtestv/__1.html" target="_blank" rel="noopener noreferrer">Einbürgerungstestverordnung § 1</a></div>
                <div><a href="https://www.gesetze-im-internet.de/einbtestv/anlage_1.html" target="_blank" rel="noopener noreferrer">Offizieller Fragenkatalog in Anlage 1</a></div>
                <div><a href="https://oet.bamf.de/ords/oetut/f?p=514:1:0" target="_blank" rel="noopener noreferrer">BAMF-Fragenkatalog zur Vorbereitung</a></div>
                <div><a href="https://www.integrationsbeauftragte.de/resource/blob/1864184/2294768/402c323bf40582a4195c2e7026cc4c02/einbuergerung-broschuere-deu-data.pdf?download=1" target="_blank" rel="noopener noreferrer">Broschüre „Mein Weg zum deutschen Pass“</a></div>
              </div>
            </div>
          </section>
        `;
      }

      function renderResults() {
        const result = state.lastResult;
        if (!result) return renderDashboard();
        const wrongs = result.review.filter(item => !item.isCorrect);
        return `
          <section class="panel card">
            <div class="section-title">
              <div>
                <h2>Ergebnis</h2>
                <div class="subtle">${result.mode === 'mistakes' ? 'Fehlertraining' : 'Prüfungssimulation'} · ${escapeHtml(result.state)} · ${formatDate(result.finishedAt)}</div>
              </div>
              <span class="score-pill ${result.passed ? 'pass' : 'fail'}">${result.passed ? 'Bestanden' : 'Nicht bestanden'}</span>
            </div>

            <div class="results-grid">
              <div class="result-box"><strong style="display:block;font-size:1.8rem;">${result.correct}/${result.total}</strong><span>Richtige Antworten</span></div>
              <div class="result-box"><strong style="display:block;font-size:1.8rem;">${Math.round((result.correct / result.total) * 100)}%</strong><span>Trefferquote</span></div>
              <div class="result-box"><strong style="display:block;font-size:1.8rem;">${formatDuration(result.durationSec)}</strong><span>Bearbeitungszeit</span></div>
            </div>

            <div class="inline-actions" style="margin-bottom:18px;">
              <button class="action-btn" id="repeatSimulation">Neue Prüfung</button>
              <button class="ghost-btn" id="repeatMistakes">Fehlertraining</button>
            </div>

            ${
              wrongs.length
                ? `
              <div class="section-title"><h2>Fehlerübersicht</h2></div>
              <div class="wrong-review">
                ${wrongs
                  .map(item => {
                    const q = getQuestion(item.questionId);
                    const selected =
                      item.selectedIndex == null
                        ? 'Keine Antwort'
                        : q.options[item.selectedIndex];
                    const correct = q.options[item.correctIndex];
                    return `
                    <div class="wrong-card">
                      <div class="question-meta">Frage ${q.number}</div>
                      <div style="font-weight:700; margin-bottom:8px;">${escapeHtml(q.question)}</div>
                      <div class="small"><strong>Deine Antwort:</strong> ${escapeHtml(selected)}</div>
                      <div class="small"><strong>Richtig:</strong> ${escapeHtml(correct)}</div>
                    </div>
                  `;
                  })
                  .join('')}
              </div>
            `
                : `<div class="empty">Starker Durchlauf. Keine Fehler gespeichert.</div>`
            }
          </section>
        `;
      }

      function renderExam() {
        const session = state.session;
        if (!session) return renderDashboard();

        const remaining = remainingSeconds(session);
        if (remaining === 0) {
          submitSession(true);
          return '';
        }

        const qid = session.questionIds[session.currentIndex];
        const question = getQuestion(qid);
        const selectedIndex = session.answers[qid] ?? null;
        const answeredCount = Object.keys(session.answers).length;
        const progress = Math.round(
          ((session.currentIndex + 1) / session.questionIds.length) * 100,
        );
        const visual = isVisualQuestion(question);

        return `
          <section class="panel exam-shell">
            <div class="exam-top">
              <div>
                <div class="question-meta">${session.mode === 'mistakes' ? 'Fehlertraining' : 'Prüfungssimulation'} · ${escapeHtml(session.state)}</div>
                <strong>Frage ${session.currentIndex + 1} von ${session.questionIds.length}</strong>
              </div>
              <div class="pill-row">
                <span class="badge">${answeredCount} beantwortet</span>
                <span class="badge ${remaining != null && remaining < 300 ? 'warning' : ''}">${remaining == null ? 'ohne Zeitlimit' : formatDuration(remaining)}</span>
              </div>
            </div>

            <div class="progress"><div class="progress-bar" style="width:${progress}%;"></div></div>

            <article class="panel question-card">
              <div class="question-meta">Offizieller Fragenpool · Frage ${question.number}</div>
              <div class="question-text">${escapeHtml(question.question)}</div>
              ${
                visual && question.imageUrl
                  ? `
                <div class="question-image">
                  <img src="${question.imageUrl}" alt="Abbildung zu Frage ${question.number}" loading="lazy" decoding="async" />
                </div>
              `
                  : ''
              }
              <div class="options">
                ${question.options
                  .map(
                    (opt, idx) => `
                  <button class="option ${selectedIndex === idx ? 'selected' : ''}" data-answer="${idx}">
                    <strong style="margin-right:8px;">${String.fromCharCode(65 + idx)}.</strong> ${escapeHtml(opt)}
                  </button>
                `,
                  )
                  .join('')}
              </div>
            </article>

            <div class="exam-nav">
              <div class="inline-actions">
                <button class="ghost-btn" id="prevQuestion" ${session.currentIndex === 0 ? 'disabled' : ''}>Vorherige Frage</button>
                <button class="ghost-btn" id="nextQuestion">${session.currentIndex === session.questionIds.length - 1 ? 'Zur Abgabe' : 'Nächste Frage'}</button>
              </div>
              <button class="action-btn" id="submitExam">Jetzt abgeben</button>
            </div>
          </section>
        `;
      }

      function bindMainEvents() {
        document
          .getElementById('heroStart')
          ?.addEventListener('click', startSimulation);
        document
          .getElementById('heroMistakes')
          ?.addEventListener('click', startMistakes);
        document
          .getElementById('mistakeStartInline')
          ?.addEventListener('click', startMistakes);
        document
          .getElementById('repeatSimulation')
          ?.addEventListener('click', startSimulation);
        document
          .getElementById('repeatMistakes')
          ?.addEventListener('click', startMistakes);

        main.querySelectorAll('[data-answer]').forEach(btn => {
          btn.addEventListener('click', () => {
            if (!state.session) return;
            const qid = state.session.questionIds[state.session.currentIndex];
            state.session.answers[qid] = Number(btn.dataset.answer);
            persistSession();
            render();
          });
        });

        document
          .getElementById('prevQuestion')
          ?.addEventListener('click', () => {
            if (!state.session) return;
            state.session.currentIndex = Math.max(
              0,
              state.session.currentIndex - 1,
            );
            persistSession();
            render();
          });

        document
          .getElementById('nextQuestion')
          ?.addEventListener('click', () => {
            if (!state.session) return;
            if (
              state.session.currentIndex ===
              state.session.questionIds.length - 1
            )
              submitSession();
            else {
              state.session.currentIndex += 1;
              persistSession();
              render();
            }
          });

        document
          .getElementById('submitExam')
          ?.addEventListener('click', () => submitSession());
      }

      function render() {
        renderNav();
        resumeButton.style.display = state.session ? 'block' : 'none';
        let html = '';
        if (state.view === 'dashboard') html = renderDashboard();
        if (state.view === 'history') html = renderHistory();
        if (state.view === 'mistakes') html = renderMistakes();
        if (state.view === 'info') html = renderInfo();
        if (state.view === 'results') html = renderResults();
        if (state.view === 'exam') html = renderExam();
        main.innerHTML = html;
        bindMainEvents();
        document.getElementById('themeToggle').textContent = themeLabel();
      }

      function hydrateControls() {
        stateSelect.innerHTML = STATE_ORDER.map(
          s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`,
        ).join('');
        stateSelect.value = state.settings.state;
        timedSelect.value = state.settings.timed ? 'timed' : 'untimed';
      }

      stateSelect.addEventListener('change', () => {
        state.settings.state = stateSelect.value;
        persistSettings();
        render();
      });

      timedSelect.addEventListener('change', () => {
        state.settings.timed = timedSelect.value === 'timed';
        persistSettings();
        render();
      });

      document
        .getElementById('startSimulation')
        .addEventListener('click', startSimulation);
      document
        .getElementById('startMistakes')
        .addEventListener('click', startMistakes);
      resumeButton.addEventListener('click', resumeSession);
      document
        .getElementById('exportData')
        .addEventListener('click', exportBackup);
      document
        .getElementById('importDataBtn')
        .addEventListener('click', () =>
          document.getElementById('importData').click(),
        );
      document.getElementById('importData').addEventListener('change', e => {
        const file = e.target.files && e.target.files[0];
        if (file) importBackup(file);
        e.target.value = '';
      });
      document.getElementById('resetData').addEventListener('click', resetAll);
      document.getElementById('themeToggle').addEventListener('click', () => {
        const current =
          document.documentElement.getAttribute('data-theme') || 'light';
        state.settings.theme = current === 'dark' ? 'light' : 'dark';
        persistSettings();
        applyTheme();
        render();
      });

      navGroup.addEventListener('click', e => {
        const btn = e.target.closest('[data-view]');
        if (!btn) return;
        state.view = btn.dataset.view;
        render();
      });

      hydrateControls();
      applyTheme();
      render();

      let timerHandle = null;
      function bootTimer() {
        if (timerHandle) clearInterval(timerHandle);
        timerHandle = setInterval(() => {
          if (
            state.view === 'exam' &&
            state.session &&
            state.session.durationSeconds != null
          ) {
            const sel = window.getSelection();
            if (sel && sel.toString().length > 0) return;
            render();
          }
        }, 1000);
      }
      bootTimer();
      } // end init
    </script>
  </body>
</html>
