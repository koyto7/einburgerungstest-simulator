name: Update questions.json

on:
  schedule:
    # Runs at 04:00 UTC on the 1st of every month
    - cron: '0 4 1 * *'
  # Allow manual trigger from GitHub UI (Actions tab → Run workflow)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # scraping ~460 questions takes ~40-80 min

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Python setup ────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'

      - name: Install uv
        run: pip install uv

      - name: Install Python dependencies
        run: uv sync

      # ── Node setup ──────────────────────────────────────────────────────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm ci

      # --with-deps installs required system libs (libnss, libglib, etc.) on Ubuntu
      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      # ── Pipeline ────────────────────────────────────────────────────────────
      - name: Parse PDF → question_bank_from_pdf.json
        run: uv run python scripts/parse_pdf_questions.py

      # General questions 1-300: use NRW to load the catalog
      # (general questions are identical regardless of state selection)
      - name: Scrape general questions (1–300)
        run: |
          node scripts/extract_answers_chunked.js \
            "Nordrhein-Westfalen" 1 300 ./answers_general.json

      # State-specific questions: 10 per state, 16 states
      - name: Scrape state questions (all 16 states)
        run: |
          for state in \
            "Baden-Württemberg" \
            "Bayern" \
            "Berlin" \
            "Brandenburg" \
            "Bremen" \
            "Hamburg" \
            "Hessen" \
            "Mecklenburg-Vorpommern" \
            "Niedersachsen" \
            "Nordrhein-Westfalen" \
            "Rheinland-Pfalz" \
            "Saarland" \
            "Sachsen" \
            "Sachsen-Anhalt" \
            "Schleswig-Holstein" \
            "Thüringen"
          do
            safe="${state// /_}"
            node scripts/extract_answers_chunked.js \
              "$state" 1 10 "./state_answers_${safe}.json"
          done

      # ── Diff-based update ──────────────────────────────────────────────────
      - name: Compare scraped data with current questions.json
        id: update
        run: |
          uv run python scripts/update_questions.py; EXIT_CODE=$?
          if [ $EXIT_CODE -eq 0 ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          elif [ $EXIT_CODE -eq 2 ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "validation_failed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "validation_failed=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Validate current questions.json (always, as a safety net) ──────────
      - name: Validate questions.json
        if: steps.update.outputs.changed == 'true'
        run: uv run python scripts/validate_questions.py

      # ── Create PR if changes detected ──────────────────────────────────────
      - name: Create update PR
        if: steps.update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/update-questions-$(date -u +%Y-%m-%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create branch and commit
          git checkout -b "$BRANCH"
          git add questions.json
          git diff --cached --quiet && { echo "No changes to commit."; exit 0; }

          git commit -m "chore: update questions.json [$(date -u +%Y-%m-%d)]"
          git push -u origin "$BRANCH"

          # Build PR body from update report
          VALIDATION_NOTE=""
          if [ "${{ steps.update.outputs.validation_failed }}" = "true" ]; then
            VALIDATION_NOTE="⚠️ **Validation failed on the candidate** — review errors in the workflow log before merging."
          fi

          REPORT_BODY=""
          if [ -f update_report.md ]; then
            REPORT_BODY=$(cat update_report.md)
          fi

          gh pr create \
            --title "chore: update questions.json ($(date -u +%Y-%m-%d))" \
            --body "$(cat <<EOF
          ## Automated Questions Update

          This PR was created automatically by the monthly scraping pipeline.

          ${VALIDATION_NOTE}

          ${REPORT_BODY}

          ---
          **Review checklist:**
          - [ ] Check the diff report above for unexpected changes
          - [ ] Verify no correct answers were changed incorrectly
          - [ ] Confirm new questions (if any) have all required fields
          - [ ] Validation passed (check workflow logs)
          EOF
          )" \
            --label "automated"

      - name: No changes summary
        if: steps.update.outputs.changed == 'false'
        run: echo "✅ questions.json is up to date — no PR needed."
